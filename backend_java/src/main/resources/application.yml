server:
  port: ${PORT:8080}

spring:
  application:
    name: studysync-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:placeholder@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:placeholder}

app:
  jwtSecret: ${JWT_SECRET:ThisIsAVeryLongSecretForTestingPurposesStudySync123!}
  jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}
  baseUrl: ${APP_BASE_URL:http://localhost:8080}

brevo:
  api:
    key: ${BREVO_API_KEY:}

---
# ==================== DEV PROFİLİ (H2 In-Memory) ====================
# Yerel geliştirme için. Uygulama her başlatıldığında veriler sıfırlanır.
# Kullanım: mvn spring-boot:run (profil belirtmeden varsayılan olarak bu çalışır)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:studysync_test
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# ==================== PROD PROFİLİ (PostgreSQL - Neon) ====================
# Canlı ortam için. Veriler kalıcıdır. Ortam değişkenleri Render.com'da ayarlanır.
# Kullanım: SPRING_PROFILES_ACTIVE=prod olarak ayarlanır (Render env vars)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  h2:
    console:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

---
# ==================== LOCAL NEON PROFİLİ ====================
# Yerel ortamda doğrudan canlı Neon veritabanına bağlanmak için.
# Kullanım: SPRING_PROFILES_ACTIVE=local-neon olarak ayarlanır.
spring:
  config:
    activate:
      on-profile: local-neon
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  h2:
    console:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
